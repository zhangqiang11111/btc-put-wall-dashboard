<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BTC 实时大号显示</title>
  <style>
    :root{
      --bg:#0a0a0a;
      --text:#e6e0d5;
    }

    html,body{height:100%;margin:0;background:var(--bg);cursor:none}
    body{display:flex;align-items:center;justify-content:center;overflow:hidden}

    #price{
      font-family: "SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
      font-size: 200px;
      line-height:1;
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      user-select:none;
      white-space:nowrap;
      letter-spacing:-0.03em;
      font-variant-numeric: tabular-nums;
      display:inline-block;
      transform-origin:center center;
      will-change: transform;
    }

    ::selection{background:transparent}
  </style>
</head>
<body>
  <div id="price" aria-live="polite">---</div>

  <script>
    const qs = new URLSearchParams(location.search);
    const SYMBOL = (qs.get('symbol') || 'BTCUSDT').toLowerCase();
    const DECIMALS = Number(qs.get('decimals') ?? 0);
    const UI_FPS = Number(qs.get('fps') ?? 10);
    const UPDATE_INTERVAL = Math.max(50, Math.floor(1000 / Math.max(1, UI_FPS)));
    const MAX_RECONNECT_DELAY = 30000;

    const el = document.getElementById('price');

    const nf = new Intl.NumberFormat(undefined, {minimumFractionDigits: DECIMALS, maximumFractionDigits: DECIMALS});
    const white = (qs.get('white') || '').toLowerCase();
    if(white === '1' || white === 'true'){
      document.documentElement.style.setProperty('--text', '#ffffff');
    }

    function formatPrice(num){
      const n = Number(num);
      if(!Number.isFinite(n)) return '---';
      return nf.format(DECIMALS === 0 ? Math.round(n) : n);
    }

    function setStatus(){ /* no-op in minimal mode */ }

    let ws;
    let reconnectDelay = 500;
    let lastUiUpdate = 0;
    let lastMessageAt = 0;
    let latestQueued = null;
    let renderTimer;

    let fitRaf = null;
    function fitToViewport(){
      if(fitRaf) return;
      fitRaf = requestAnimationFrame(()=>{
        fitRaf = null;
        const vw = Math.max(1, window.innerWidth);
        const vh = Math.max(1, window.innerHeight);
        el.style.transform = 'scale(1)';
        const rect = el.getBoundingClientRect();
        if(rect.width === 0 || rect.height === 0) return;
        const scale = Math.min((vw * 0.92) / rect.width, (vh * 0.86) / rect.height);
        el.style.transform = `scale(${scale})`;
      });
    }

    function renderPrice(raw){
      const n = Number(raw);
      if(!Number.isFinite(n)) return;
      el.textContent = formatPrice(n);
      fitToViewport();
    }

    function scheduleRender(raw){
      latestQueued = raw;
      const now = performance.now();
      if(now - lastUiUpdate >= UPDATE_INTERVAL){
        lastUiUpdate = now;
        renderPrice(latestQueued);
        latestQueued = null;
        return;
      }
      if(renderTimer) return;
      const delay = UPDATE_INTERVAL - (now - lastUiUpdate);
      renderTimer = setTimeout(()=>{
        renderTimer = null;
        lastUiUpdate = performance.now();
        if(latestQueued != null) renderPrice(latestQueued);
        latestQueued = null;
      }, delay);
    }

    function connect(){
      const url = `wss://stream.binance.com:9443/ws/${SYMBOL}@trade`;
      ws = new WebSocket(url);

      ws.onopen = ()=>{
        reconnectDelay = 500;
        setStatus('live');
      };

      ws.onmessage = (ev)=>{
        try{
          const data = JSON.parse(ev.data);
          const price = data.p || data.price || data.c;
          if(price){
            lastMessageAt = Date.now();
            scheduleRender(price);
          }
        }catch(err){
          console.warn('parse msg', err);
        }
      };

      ws.onclose = ()=>{
        setStatus('reconnecting');
        setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 1.5, MAX_RECONNECT_DELAY);
      };

      ws.onerror = ()=>{
        setStatus('error');
        ws.close();
      };
    }

    let fallbackTimer;
    function startFallbackPolling(){
      if(fallbackTimer) return;
      async function poll(){
        try{
          const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
          const j = await r.json();
          if(j && j.bitcoin && j.bitcoin.usd!=null){
            scheduleRender(j.bitcoin.usd);
          }
        }catch(e){ console.warn('coingecko poll failed', e); }
      }
      poll();
      fallbackTimer = setInterval(poll, 5000);
      setStatus('polling');
    }

    function stopFallbackPolling(){
      if(!fallbackTimer) return;
      clearInterval(fallbackTimer);
      fallbackTimer = null;
    }

    function start(){
      if('WebSocket' in window){
        connect();
        setTimeout(()=>{
          if(el.textContent === '---') startFallbackPolling();
        }, 5000);
      }else{
        startFallbackPolling();
      }
    }

    start();
    fitToViewport();

    window.addEventListener('resize', fitToViewport);

    // 如果 5 秒没收到消息，开启轮询兜底
    setInterval(()=>{
      if(lastMessageAt && Date.now() - lastMessageAt > 5000){
        startFallbackPolling();
      }else if(lastMessageAt){
        stopFallbackPolling();
      }
    }, 2000);

    // 进入全屏（多数浏览器需要用户手势）
    function requestFullscreen(){
      const elem = document.documentElement;
      if (elem.requestFullscreen) return elem.requestFullscreen();
      if (elem.webkitRequestFullscreen) return elem.webkitRequestFullscreen();
      if (elem.msRequestFullscreen) return elem.msRequestFullscreen();
    }

    window.addEventListener('load', ()=>{
      requestFullscreen().catch(()=>{});
    });
  </script>
</body>
</html>
