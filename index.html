<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>BTC</title>

<style>

:root{
  --bg-start:#141c2e;
  --bg-mid:#0f1625;
  --bg-end:#0a0e1a;
}

html,body{
  margin:0;
  height:100%;
  overflow:hidden;

  background:
  radial-gradient(circle at 50% 30%,var(--bg-start),var(--bg-mid) 60%,var(--bg-end));

  color:#f1f5f9;

  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "SF Pro Display",
  "Helvetica Neue",
  Helvetica,
  Arial,
  sans-serif;

}

#price{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);

  display:flex;
  align-items:baseline;

  font-weight:500;
  letter-spacing:-0.02em;
}

.digit{
  position:relative;
  overflow:hidden;

  font-size:22vw;
  line-height:1;

  width:.62em;
  height:1em;
}

.digit span{
  position:absolute;
  left:0;
  right:0;

  display:flex;
  align-items:center;
  justify-content:center;

  transition:
  transform 420ms cubic-bezier(.25,.1,.25,1),
  opacity 420ms cubic-bezier(.25,.1,.25,1);
}

.sep{
  font-size:22vw;
  margin:0 .05em;
}

#ver{
  position:absolute;
  bottom:16px;
  right:18px;

  opacity:.35;
  font-size:18px;
}

</style>
</head>

<body>

<div id="price"></div>

<div id="ver">v=2026-03-04d</div>

<script>

const container=document.getElementById("price")

let prev=""

function render(price){

let str=Number(price).toLocaleString()

if(str===prev)return

container.innerHTML=""

for(let i=0;i<str.length;i++){

let c=str[i]

if(c===","){
let s=document.createElement("div")
s.className="sep"
s.innerText=","
container.appendChild(s)
continue
}

let d=document.createElement("div")
d.className="digit"

let old=document.createElement("span")
old.innerText=prev[i]||c
old.style.transform="translateY(0)"

let neu=document.createElement("span")
neu.innerText=c
neu.style.transform="translateY(100%)"

d.appendChild(old)
d.appendChild(neu)

container.appendChild(d)

requestAnimationFrame(()=>{
old.style.transform="translateY(-100%)"
neu.style.transform="translateY(0)"
})

}

prev=str
}

async function fetchPrice(){

try{

let r=await fetch(
"https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT",
{cache:"no-store"}
)

let j=await r.json()

render(j.price)

}catch(e){}

}

fetchPrice()

setInterval(fetchPrice,2000)

</script>

</body>
</html>
